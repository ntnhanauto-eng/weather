<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather PRO ULTIMATE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{font-family:system-ui;background:linear-gradient(135deg,#667eea,#764ba2);padding:20px}
.container{max-width:1100px;margin:auto;background:#fff;border-radius:20px;overflow:hidden}
.header{text-align:center;color:#fff;padding:20px;background:linear-gradient(135deg,#4facfe,#00f2fe)}
input{margin:15px;padding:10px 15px;border-radius:30px;border:2px solid #ddd}
.content{padding:20px}

.current{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.box{padding:20px;border-radius:15px}
.main{background:#fcd5ce;text-align:center;font-size:40px}
.detail{background:#eee}

.hourly{display:flex;gap:10px;overflow-x:auto;margin-top:20px}
.hour{min-width:90px;background:#fff;padding:10px;border-radius:10px;text-align:center}

.daily{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:20px}
.day{background:#eee;padding:15px;border-radius:10px;text-align:center}

#map{height:400px;border-radius:15px;margin-top:20px}
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <h2>🌤️ Weather PRO ULTIMATE</h2>
    <div id="location">...</div>
  </div>

  <input id="search" placeholder="Nhập thành phố...">

  <div class="content">
    <div id="loading">Đang tải...</div>

    <div id="app" style="display:none">

      <div class="current">
        <div class="box main">
          <div id="temp"></div>
          <div id="icon"></div>
        </div>

        <div class="box detail">
          <div>💧 <span id="humidity"></span></div>
          <div>🌬️ <span id="wind"></span></div>
          <div>🌡️ <span id="pressure"></span></div>
        </div>
      </div>

      <h3>24 giờ tới</h3>
      <div class="hourly" id="hourly"></div>

      <h3>4 ngày (có hôm qua)</h3>
      <div class="daily" id="daily"></div>

      <h3>🌧️ Radar (giữ để chọn vị trí)</h3>
      <div id="map"></div>

    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let lat, lon;
let sunrise, sunset;
let map, marker;

// ===== MOON =====
function getMoonPhase(d=new Date()){
  const lp=2551443;
  const nm=new Date('2000-01-06T18:14:00Z').getTime();
  return (((d.getTime()-nm)/1000)%lp)/lp;
}
function moonIcon(p){
  if(p<0.03||p>0.97) return '🌑';
  if(p<0.22) return '🌒';
  if(p<0.28) return '🌓';
  if(p<0.47) return '🌔';
  if(p<0.53) return '🌕';
  if(p<0.72) return '🌖';
  if(p<0.78) return '🌗';
  return '🌘';
}

// ===== ICON =====
function icon(code,time){
  const night = time < sunrise || time > sunset;
  if(night) return moonIcon(getMoonPhase(time));

  if(code===0) return '☀️';
  if(code<=2) return '⛅';
  if(code===3) return '☁️';
  if(code>=51) return '🌧️';
  if(code>=80) return '🌦️';
  if(code>=95) return '⛈️';

  return '🌤️';
}

// ===== WEATHER =====
async function loadWeather(){

  loading.style.display='block';
  app.style.display='none';

  const res=await fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}
&current=temperature_2m,relativehumidity_2m,windspeed_10m,weathercode,pressure_msl
&hourly=temperature_2m,weathercode,precipitation
&daily=temperature_2m_max,temperature_2m_min,weathercode,sunrise,sunset,precipitation_sum
&past_days=1
&timezone=auto`
  );

  const data=await res.json();

  sunrise=new Date(data.daily.sunrise[1]);
  sunset=new Date(data.daily.sunset[1]);

  loading.style.display='none';
  app.style.display='block';

  const now=new Date();

  temp.textContent=Math.round(data.current.temperature_2m)+'°';
  iconEl.textContent=icon(data.current.weathercode,now);
  humidity.textContent=data.current.relativehumidity_2m+'%';
  wind.textContent=data.current.windspeed_10m+' km/h';
  pressure.textContent=data.current.pressure_msl+' hPa';

  // ===== HOURLY =====
  let h='';
  for(let i=0;i<data.hourly.time.length;i++){
    const t=new Date(data.hourly.time[i]);
    const diff=(t-now)/3600000;
    if(diff>=0 && diff<=24){
      h+=`<div class="hour">
      ${t.getHours()}h<br>
      ${Math.round(data.hourly.temperature_2m[i])}°<br>
      ${icon(data.hourly.weathercode[i],t)}<br>
      🌧️ ${data.hourly.precipitation[i]} mm
      </div>`;
    }
  }
  hourly.innerHTML=h;

  // ===== DAILY (4 NGÀY) =====
  const names=['Hôm qua','Hôm nay','Ngày mai','Ngày kia'];

  let d='';
  for(let i=0;i<4;i++){
    const noon=new Date(data.daily.time[i]);
    noon.setHours(12);

    d+=`<div class="day">
    ${names[i]}<br>
    ${icon(data.daily.weathercode[i],noon)}<br>
    ${Math.round(data.daily.temperature_2m_max[i])}° /
    ${Math.round(data.daily.temperature_2m_min[i])}°<br>
    🌧️ ${data.daily.precipitation_sum[i]} mm
    </div>`;
  }
  daily.innerHTML=d;

  initRadar();
}

// ===== RADAR =====
async function initRadar(){

  if(map) map.remove();

  map=L.map('map').setView([lat,lon],6);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  const res=await fetch('https://api.rainviewer.com/public/weather-maps.json');
  const data=await res.json();
  const latest=data.radar.past.slice(-1)[0];

  L.tileLayer(
    `https://tilecache.rainviewer.com/v2/radar/${latest.time}/256/{z}/{x}/{y}/2/1_1.png`,
    {opacity:0.6}
  ).addTo(map);

  updateMarker();
  setupLongPress();
}

// ===== MARKER =====
function updateMarker(){
  if(marker) map.removeLayer(marker);
  marker=L.marker([lat,lon]).addTo(map);
}

// ===== LONG PRESS =====
let pressTimer;

function setupLongPress(){

  map.on('mousedown', function(e){

    pressTimer=setTimeout(async ()=>{

      lat=e.latlng.lat;
      lon=e.latlng.lng;

      map.setView([lat,lon],8);
      updateMarker();

      try{
        const res=await fetch(
          `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`
        );
        const d=await res.json();
        location.textContent=d.display_name.split(',')[0];
      }catch{
        location.textContent='Vị trí đã chọn';
      }

      loadWeather();

    },600);
  });

  map.on('mouseup', ()=>clearTimeout(pressTimer));
  map.on('mouseout', ()=>clearTimeout(pressTimer));
}

// ===== SEARCH =====
search.addEventListener('keypress', async e=>{
  if(e.key==='Enter'){
    const city=e.target.value;

    const res=await fetch(
      `https://nominatim.openstreetmap.org/search?q=${city}&format=json&limit=1`
    );
    const data=await res.json();

    if(data[0]){
      lat=parseFloat(data[0].lat);
      lon=parseFloat(data[0].lon);

      location.textContent=data[0].display_name.split(',')[0];

      if(map){
        map.setView([lat,lon],8);
        updateMarker();
      }

      loadWeather();
    }
  }
});

// ===== INIT =====
navigator.geolocation.getCurrentPosition(async pos=>{
  lat=pos.coords.latitude;
  lon=pos.coords.longitude;

  const res=await fetch(
    `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`
  );
  const data=await res.json();

  location.textContent=data.display_name.split(',')[0];

  window.temp=temp;
  window.iconEl=icon;
  window.humidity=humidity;
  window.wind=wind;
  window.pressure=pressure;
  window.hourly=hourly;
  window.daily=daily;

  loadWeather();
});
</script>

</body>
</html>
