<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather PRO ULTIMATE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{font-family:system-ui;background:linear-gradient(135deg,#667eea,#764ba2);margin:0}

.container{max-width:1100px;margin:auto;background:#fff;border-radius:20px;overflow:hidden}

.header{text-align:center;color:#fff;padding:20px;background:linear-gradient(135deg,#4facfe,#00f2fe)}

.search-box{
  position:relative;
  display:flex;
  gap:10px;
  padding:10px;
}

.search-box input{
  flex:1;
  padding:12px;
  border-radius:30px;
  border:2px solid #ddd;
}

.search-box button{
  width:45px;height:45px;border:none;border-radius:50%;
  background:#4facfe;color:#fff;font-size:18px;
}

.suggestions{
  position:absolute;
  top:60px;
  left:10px;
  right:10px;
  background:#fff;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  display:none;
}

.suggest-item{padding:12px;cursor:pointer}
.suggest-item:hover{background:#eee}

.content{padding:15px}

.current{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.box{padding:15px;border-radius:15px}

.main{
  background:#fcd5ce;
  text-align:center;
  font-size:40px;
}

.detail{background:#eee}

#desc{
  font-size:18px;
  margin-top:5px;
  font-weight:bold;
  color:#333;
}

.hourly{display:flex;gap:10px;overflow-x:auto;margin-top:15px}
.hour{min-width:80px;background:#fff;padding:10px;border-radius:10px;text-align:center}

.daily{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:15px}
.day{background:#eee;padding:10px;border-radius:10px;text-align:center}

#map{height:350px;border-radius:15px;margin-top:15px}

.footer{
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  color:white;text-align:center;padding:15px
}

@media(max-width:768px){
  .container{border-radius:0}
  .current{grid-template-columns:1fr}
  .daily{grid-template-columns:repeat(2,1fr)}
  #map{height:280px}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h2>🌤️ Weather PRO ULTIMATE</h2>
  <div id="location">Đang lấy vị trí...</div>
</div>

<div class="search-box">
  <input id="search" placeholder="Nhập vị trí...">
  <button id="btnSearch">🔍</button>

  <div id="suggestions" class="suggestions">
    <div class="suggest-item" id="useCurrent">📍 Vị trí của bạn</div>
  </div>
</div>

<div class="content">
<div id="loading">Đang tải...</div>

<div id="app" style="display:none">

<div class="current">
  <div class="box main">
    <div id="temp"></div>
    <div id="icon"></div>
    <div id="desc"></div>
  </div>

  <div class="box detail">
    <div>💧 <span id="humidity"></span></div>
    <div>🌬️ <span id="wind"></span></div>
    <div>🌡️ <span id="pressure"></span></div>
  </div>
</div>

<h3>24 giờ tới</h3>
<div class="hourly" id="hourly"></div>

<h3>4 ngày (có hôm qua)</h3>
<div class="daily" id="daily"></div>

<h3>🌧️ Radar (giữ để chọn vị trí)</h3>
<div id="map"></div>

</div>
</div>

<div class="footer">
  <p>🌤️ Weather PRO ULTIMATE</p>
  <p>Developed by Nhân Nguyễn</p>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let lat, lon, map, marker;

const locationEl = document.getElementById('location');
const tempEl = document.getElementById('temp');
const iconEl = document.getElementById('icon');
const descEl = document.getElementById('desc');
const humidityEl = document.getElementById('humidity');
const windEl = document.getElementById('wind');
const pressureEl = document.getElementById('pressure');
const hourlyEl = document.getElementById('hourly');
const dailyEl = document.getElementById('daily');
const loadingEl = document.getElementById('loading');
const appEl = document.getElementById('app');
const searchInput = document.getElementById('search');

const suggestions = document.getElementById('suggestions');
const useCurrent = document.getElementById('useCurrent');

// FORMAT ADDRESS
function formatAddress(addr){
  return [
    addr.suburb || addr.village || '',
    addr.city || addr.county || '',
    addr.state || '',
    addr.country || ''
  ].filter(Boolean).join(', ');
}

// ICON
function icon(code){
  if(code===0) return '☀️';
  if(code<=2) return '⛅';
  if(code===3) return '☁️';
  if(code>=51) return '🌧️';
  if(code>=80) return '🌦️';
  if(code>=95) return '⛈️';
  return '🌤️';
}

// DESC
function getWeatherDesc(code){
  if(code === 0) return 'Nắng';
  if(code === 1) return 'Nắng nhẹ';
  if(code === 2) return 'Ít mây';
  if(code === 3) return 'Nhiều mây';
  if(code >= 45 && code <= 48) return 'Sương mù';
  if(code >= 51 && code <= 55) return 'Mưa phùn';
  if(code >= 61 && code <= 65) return 'Mưa nhẹ';
  if(code >= 80) return 'Mưa rào';
  if(code >= 95) return 'Dông / Mưa to';
  return 'Thời tiết ổn định';
}

// RESET
function resetSearch(){
  searchInput.value='';
  searchInput.blur();
}

// WEATHER
async function loadWeather(){
  loadingEl.style.display='block';
  appEl.style.display='none';

  const res=await fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}
&current=temperature_2m,relativehumidity_2m,windspeed_10m,weathercode,pressure_msl
&hourly=temperature_2m,weathercode,precipitation
&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_sum
&past_days=1&timezone=auto`
  );

  const data=await res.json();

  loadingEl.style.display='none';
  appEl.style.display='block';

  tempEl.textContent=Math.round(data.current.temperature_2m)+'°';
  iconEl.textContent=icon(data.current.weathercode);
  descEl.textContent=getWeatherDesc(data.current.weathercode);

  humidityEl.textContent=data.current.relativehumidity_2m+'%';
  windEl.textContent=data.current.windspeed_10m+' km/h';
  pressureEl.textContent=data.current.pressure_msl+' hPa';

  const now=new Date();
  let h='';
  for(let i=0;i<data.hourly.time.length;i++){
    const t=new Date(data.hourly.time[i]);
    if((t-now)/3600000>=0 && (t-now)/3600000<=24){
      h+=`<div class="hour">
      ${t.getHours()}h<br>
      ${Math.round(data.hourly.temperature_2m[i])}°<br>
      ${icon(data.hourly.weathercode[i])}<br>
      🌧️ ${data.hourly.precipitation[i]} mm
      </div>`;
    }
  }
  hourlyEl.innerHTML=h;

  const names=['Hôm qua','Hôm nay','Ngày mai','Ngày kia'];
  let d='';
  for(let i=0;i<4;i++){
    d+=`<div class="day">
    ${names[i]}<br>
    ${icon(data.daily.weathercode[i])}<br>
    ${Math.round(data.daily.temperature_2m_max[i])}° /
    ${Math.round(data.daily.temperature_2m_min[i])}°<br>
    🌧️ ${data.daily.precipitation_sum[i]} mm
    </div>`;
  }
  dailyEl.innerHTML=d;

  initMap();
}

// MAP
function initMap(){
  if(map) map.remove();

  map=L.map('map').setView([lat,lon],8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  marker=L.marker([lat,lon]).addTo(map);
}

// SEARCH
async function handleSearch(){
  const city = searchInput.value.trim();
  if(!city) return;

  const res=await fetch(
    `https://nominatim.openstreetmap.org/search?q=${city}&format=json&limit=1&addressdetails=1`
  );

  const data=await res.json();

  if(data.length > 0){
    lat=parseFloat(data[0].lat);
    lon=parseFloat(data[0].lon);

    locationEl.textContent=formatAddress(data[0].address);

    if(map){
      map.setView([lat,lon],8);
      marker.setLatLng([lat,lon]);
    }

    loadWeather();
    resetSearch();
    suggestions.style.display='none';
  }else{
    alert("Không tìm thấy vị trí!");
  }
}

// EVENTS
searchInput.addEventListener('keypress', e=>{
  if(e.key==='Enter') handleSearch();
});

document.getElementById('btnSearch')
  .addEventListener('click', handleSearch);

// INIT
navigator.geolocation.getCurrentPosition(async pos=>{
  lat=pos.coords.latitude;
  lon=pos.coords.longitude;

  const res=await fetch(
    `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&addressdetails=1`
  );

  const data=await res.json();

  locationEl.textContent=formatAddress(data.address);

  loadWeather();
});
</script>

</body>
</html>
