<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather PRO ULTIMATE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{font-family:system-ui;background:linear-gradient(135deg,#667eea,#764ba2);padding:20px}
.container{max-width:1100px;margin:auto;background:#fff;border-radius:20px;overflow:hidden}

.header{text-align:center;color:#fff;padding:20px;background:linear-gradient(135deg,#4facfe,#00f2fe)}

.search-box{display:flex;justify-content:center;gap:10px;margin-top:10px}
.search-box input{
  padding:10px 15px;border-radius:30px;border:2px solid #ddd;width:250px
}
.search-box button{
  border:none;border-radius:50%;width:45px;height:45px;
  background:#4facfe;color:white;font-size:18px;cursor:pointer
}

.content{padding:20px}

.current{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.box{padding:20px;border-radius:15px}
.main{background:#fcd5ce;text-align:center;font-size:40px}
.detail{background:#eee}

.hourly{display:flex;gap:10px;overflow-x:auto;margin-top:20px}
.hour{min-width:90px;background:#fff;padding:10px;border-radius:10px;text-align:center}

.daily{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:20px}
.day{background:#eee;padding:15px;border-radius:10px;text-align:center}

#map{height:400px;border-radius:15px;margin-top:20px}

.footer{
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  color:white;padding:20px;text-align:center
}
.version{font-size:12px;opacity:0.8}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h2>🌤️ Weather PRO ULTIMATE</h2>
  <div id="location">Đang lấy vị trí...</div>
</div>

<div class="search-box">
  <input id="search" placeholder="Nhập vị trí...">
  <button id="btnSearch">🔍</button>
</div>

<div class="content">
<div id="loading">Đang tải...</div>

<div id="app" style="display:none">

<div class="current">
  <div class="box main">
    <div id="temp"></div>
    <div id="icon"></div>
  </div>

  <div class="box detail">
    <div>💧 <span id="humidity"></span></div>
    <div>🌬️ <span id="wind"></span></div>
    <div>🌡️ <span id="pressure"></span></div>
  </div>
</div>

<h3>24 giờ tới</h3>
<div class="hourly" id="hourly"></div>

<h3>4 ngày (có hôm qua)</h3>
<div class="daily" id="daily"></div>

<h3>🌧️ Radar (giữ để chọn vị trí)</h3>
<div id="map"></div>

</div>
</div>

<div class="footer">
  <h4>🌤️ Weather PRO ULTIMATE</h4>
  <p>Developed by <b>Nhân Nguyễn</b></p>
  <p class="version">Version 1.0.0 • © 2026</p>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let lat, lon, map, marker;

const locationEl = document.getElementById('location');
const tempEl = document.getElementById('temp');
const iconEl = document.getElementById('icon');
const humidityEl = document.getElementById('humidity');
const windEl = document.getElementById('wind');
const pressureEl = document.getElementById('pressure');
const hourlyEl = document.getElementById('hourly');
const dailyEl = document.getElementById('daily');
const loadingEl = document.getElementById('loading');
const appEl = document.getElementById('app');
const searchInput = document.getElementById('search');

function formatAddress(addr){
  return [
    addr.suburb || addr.village || '',
    addr.city || addr.county || '',
    addr.state || '',
    addr.country || ''
  ].filter(Boolean).join(', ');
}

function icon(code){
  if(code===0) return '☀️';
  if(code<=2) return '⛅';
  if(code===3) return '☁️';
  if(code>=51) return '🌧️';
  if(code>=80) return '🌦️';
  if(code>=95) return '⛈️';
  return '🌤️';
}

function resetSearch(){
  searchInput.value='';
  searchInput.placeholder='Nhập vị trí để tiếp tục tìm kiếm';
  searchInput.blur();
}

async function loadWeather(){
  loadingEl.style.display='block';
  appEl.style.display='none';

  const res=await fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}
&current=temperature_2m,relativehumidity_2m,windspeed_10m,weathercode,pressure_msl
&hourly=temperature_2m,weathercode,precipitation
&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_sum
&past_days=1&timezone=auto`
  );

  const data=await res.json();

  loadingEl.style.display='none';
  appEl.style.display='block';

  tempEl.textContent=Math.round(data.current.temperature_2m)+'°';
  iconEl.textContent=icon(data.current.weathercode);
  humidityEl.textContent=data.current.relativehumidity_2m+'%';
  windEl.textContent=data.current.windspeed_10m+' km/h';
  pressureEl.textContent=data.current.pressure_msl+' hPa';

  const now=new Date();
  let h='';
  for(let i=0;i<data.hourly.time.length;i++){
    const t=new Date(data.hourly.time[i]);
    if((t-now)/3600000>=0 && (t-now)/3600000<=24){
      h+=`<div class="hour">
      ${t.getHours()}h<br>
      ${Math.round(data.hourly.temperature_2m[i])}°<br>
      ${icon(data.hourly.weathercode[i])}<br>
      🌧️ ${data.hourly.precipitation[i]} mm
      </div>`;
    }
  }
  hourlyEl.innerHTML=h;

  const names=['Hôm qua','Hôm nay','Ngày mai','Ngày kia'];
  let d='';
  for(let i=0;i<4;i++){
    d+=`<div class="day">
    ${names[i]}<br>
    ${icon(data.daily.weathercode[i])}<br>
    ${Math.round(data.daily.temperature_2m_max[i])}° /
    ${Math.round(data.daily.temperature_2m_min[i])}°<br>
    🌧️ ${data.daily.precipitation_sum[i]} mm
    </div>`;
  }
  dailyEl.innerHTML=d;

  initMap();
}

function initMap(){
  if(map) map.remove();

  map=L.map('map').setView([lat,lon],6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  marker=L.marker([lat,lon]).addTo(map);

  let timer;
  map.on('mousedown', e=>{
    timer=setTimeout(async ()=>{
      lat=e.latlng.lat;
      lon=e.latlng.lng;

      map.setView([lat,lon],8);
      marker.setLatLng([lat,lon]);

      const res=await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&addressdetails=1`
      );
      const d=await res.json();

      locationEl.textContent=formatAddress(d.address);

      loadWeather();
      resetSearch();

    },600);
  });

  map.on('mouseup', ()=>clearTimeout(timer));
}

async function handleSearch(){
  const city = searchInput.value.trim();
  if(!city) return;

  const res=await fetch(
    `https://nominatim.openstreetmap.org/search?q=${city}&format=json&limit=1&addressdetails=1`
  );
  const data=await res.json();

  if(data[0]){
    lat=parseFloat(data[0].lat);
    lon=parseFloat(data[0].lon);

    locationEl.textContent=formatAddress(data[0].address);

    if(map){
      map.setView([lat,lon],8);
      marker.setLatLng([lat,lon]);
    }

    loadWeather();
    resetSearch();
  }
}

searchInput.addEventListener('keypress', e=>{
  if(e.key==='Enter') handleSearch();
});

document.getElementById('btnSearch')
  .addEventListener('click', handleSearch);

navigator.geolocation.getCurrentPosition(async pos=>{
  lat=pos.coords.latitude;
  lon=pos.coords.longitude;

  const res=await fetch(
    `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&addressdetails=1`
  );
  const data=await res.json();

  locationEl.textContent=formatAddress(data.address);

  loadWeather();
});
</script>

</body>
</html>
