<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather PRO FINAL</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html, body{
  margin:0;
  scroll-behavior:smooth;
  font-family:system-ui;
  background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{
  max-width:1100px;
  margin:auto;
  background:#fff;
  border-radius:20px;
  overflow:hidden;
}

.header{
  text-align:center;
  color:#fff;
  padding:20px;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
}

/* SEARCH */
.search-box{
  position:relative;
  display:flex;
  gap:10px;
  padding:10px;
}

.search-box input{
  flex:1;
  padding:12px;
  border-radius:30px;
  border:2px solid #ddd;
}

.search-box button{
  width:45px;height:45px;
  border:none;
  border-radius:50%;
  background:#4facfe;
  color:white;
}

/* DROPDOWN */
.suggestions{
  position:absolute;
  top:60px;
  left:10px;
  right:10px;
  background:#fff;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  display:none;
}

.suggest-item{
  padding:12px;
  cursor:pointer;
}

.suggest-item:hover{background:#eee}

/* CONTENT */
.content{padding:15px}

.current{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.box{padding:15px;border-radius:15px}

.main{
  background:#fcd5ce;
  text-align:center;
  font-size:40px;
}

.detail{background:#eee}

.hourly{
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.hour{
  min-width:80px;
  background:#fff;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.daily{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.day{
  background:#eee;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

#map{
  height:350px;
  border-radius:15px;
}

/* FOOTER */
.footer{
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  color:white;
  text-align:center;
  padding:15px;
}

/* MOBILE */
@media(max-width:768px){
  .container{border-radius:0}
  .current{grid-template-columns:1fr}
  .daily{grid-template-columns:repeat(2,1fr)}
  #map{height:280px}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h2>🌤️ Weather PRO FINAL</h2>
  <div id="location">Đang lấy vị trí...</div>
</div>

<div class="search-box">
  <input id="search" placeholder="Nhập vị trí...">
  <button id="btnSearch">🔍</button>

  <div id="suggestions" class="suggestions">
    <div class="suggest-item" id="useCurrent">📍 Vị trí của bạn</div>
  </div>
</div>

<div class="content">
<div id="loading">Đang tải...</div>

<div id="app" style="display:none">

<div class="current">
  <div class="box main">
    <div id="temp"></div>
    <div id="icon"></div>
  </div>

  <div class="box detail">
    <div>💧 <span id="humidity"></span></div>
    <div>🌬️ <span id="wind"></span></div>
    <div>🌡️ <span id="pressure"></span></div>
  </div>
</div>

<h3>24 giờ tới</h3>
<div class="hourly" id="hourly"></div>

<h3>4 ngày (có hôm qua)</h3>
<div class="daily" id="daily"></div>

<h3>🌧️ Radar (giữ để chọn vị trí)</h3>
<div id="map"></div>

</div>
</div>

<div class="footer">
  <p>Weather PRO FINAL</p>
  <p>Developed by Nhân Nguyễn</p>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let lat, lon, map, marker;

const searchInput = document.getElementById('search');
const suggestions = document.getElementById('suggestions');
const useCurrent = document.getElementById('useCurrent');

// RESET UI (QUAN TRỌNG)
function resetUI(){
  searchInput.blur();
  window.scrollTo({top:0,behavior:'smooth'});
}

// RESET SEARCH
function resetSearch(){
  searchInput.value='';
  searchInput.placeholder='Nhập vị trí để tiếp tục tìm kiếm';
}

// FORMAT ADDRESS
function formatAddress(a){
  return [
    a.suburb||a.village||'',
    a.city||a.county||'',
    a.state||'',
    a.country||''
  ].filter(Boolean).join(', ');
}

// ICON
function icon(c){
  if(c===0) return '☀️';
  if(c<=2) return '⛅';
  if(c===3) return '☁️';
  if(c>=51) return '🌧️';
  if(c>=80) return '🌦️';
  if(c>=95) return '⛈️';
  return '🌤️';
}

// LOAD WEATHER
async function loadWeather(){
  document.getElementById('loading').style.display='block';
  document.getElementById('app').style.display='none';

  const res=await fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}
&current=temperature_2m,relativehumidity_2m,windspeed_10m,weathercode,pressure_msl
&hourly=temperature_2m,weathercode,precipitation
&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_sum
&past_days=1&timezone=auto`
  );

  const data=await res.json();

  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';

  document.getElementById('temp').textContent=Math.round(data.current.temperature_2m)+'°';
  document.getElementById('icon').textContent=icon(data.current.weathercode);
  document.getElementById('humidity').textContent=data.current.relativehumidity_2m+'%';
  document.getElementById('wind').textContent=data.current.windspeed_10m+' km/h';
  document.getElementById('pressure').textContent=data.current.pressure_msl+' hPa';

  // HOURLY
  const now=new Date();
  let h='';
  data.hourly.time.forEach((t,i)=>{
    const d=new Date(t);
    if((d-now)/3600000>=0 && (d-now)/3600000<=24){
      h+=`<div class="hour">
      ${d.getHours()}h<br>
      ${Math.round(data.hourly.temperature_2m[i])}°<br>
      ${icon(data.hourly.weathercode[i])}<br>
      🌧️ ${data.hourly.precipitation[i]} mm
      </div>`;
    }
  });
  document.getElementById('hourly').innerHTML=h;

  // DAILY
  const names=['Hôm qua','Hôm nay','Ngày mai','Ngày kia'];
  let d='';
  for(let i=0;i<4;i++){
    d+=`<div class="day">
    ${names[i]}<br>
    ${icon(data.daily.weathercode[i])}<br>
    ${Math.round(data.daily.temperature_2m_max[i])}° /
    ${Math.round(data.daily.temperature_2m_min[i])}°<br>
    🌧️ ${data.daily.precipitation_sum[i]} mm
    </div>`;
  }
  document.getElementById('daily').innerHTML=d;

  initMap();
}

// MAP
function initMap(){
  if(map) map.remove();

  map=L.map('map').setView([lat,lon],6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  marker=L.marker([lat,lon]).addTo(map);

  let timer;
  map.on('mousedown', e=>{
    timer=setTimeout(async ()=>{
      lat=e.latlng.lat;
      lon=e.latlng.lng;

      map.setView([lat,lon],8);
      marker.setLatLng([lat,lon]);

      const res=await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&addressdetails=1`
      );
      const d=await res.json();

      document.getElementById('location').textContent=formatAddress(d.address);

      loadWeather();
      resetSearch();
      resetUI();

    },600);
  });

  map.on('mouseup', ()=>clearTimeout(timer));
}

// SEARCH
async function handleSearch(){
  const city=searchInput.value.trim();
  if(!city) return;

  const res=await fetch(
    `https://nominatim.openstreetmap.org/search?q=${city}&format=json&limit=1&addressdetails=1`
  );
  const data=await res.json();

  if(data[0]){
    lat=parseFloat(data[0].lat);
    lon=parseFloat(data[0].lon);

    document.getElementById('location').textContent=formatAddress(data[0].address);

    loadWeather();
    resetSearch();
    resetUI();
  }
}

// EVENTS
searchInput.addEventListener('focus', ()=>suggestions.style.display='block');

searchInput.addEventListener('input', ()=>{
  useCurrent.style.display =
    searchInput.value.trim() ? 'none' : 'block';
});

document.addEventListener('click', e=>{
  if(!e.target.closest('.search-box')){
    suggestions.style.display='none';
  }
});

searchInput.addEventListener('keypress', e=>{
  if(e.key==='Enter') handleSearch();
});

document.getElementById('btnSearch')
  .addEventListener('click', handleSearch);

// GPS
useCurrent.addEventListener('click', ()=>{
  navigator.geolocation.getCurrentPosition(async pos=>{
    lat=pos.coords.latitude;
    lon=pos.coords.longitude;

    const res=await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&addressdetails=1`
    );
    const data=await res.json();

    document.getElementById('location').textContent=formatAddress(data.address);

    loadWeather();
    resetSearch();
    resetUI();
  });
});

// INIT
navigator.geolocation.getCurrentPosition(async pos=>{
  lat=pos.coords.latitude;
  lon=pos.coords.longitude;

  const res=await fetch(
    `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&addressdetails=1`
  );
  const data=await res.json();

  document.getElementById('location').textContent=formatAddress(data.address);

  loadWeather();
});
</script>

</body>
</html>
